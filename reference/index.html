<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curate My Stay : For Property Owners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --rausch-50:#FFF1F1; --rausch-100:#FFE0E1; --rausch-300:#FF9295; --rausch-500:#FF5A5F;
  --rausch-600:#E54B50; --rausch-700:#D63E43; --rausch-800:#B22F33;
  --sunset-coral:#E98363; --sunset-orange:#E1914F; --sunset-amber:#E9AA4B;
  --lagoon-50:#EAF3F5; --lagoon-300:#7FB3C2; --lagoon-500:#3C8399; --lagoon-700:#2C6478;
  --ink:#222222; --ink-2:#484848; --gray-600:#717171; --gray-400:#B0B0B0; --gray-300:#DDDDDD;
  --gray-200:#EBEBEB; --gray-100:#F7F7F7; --white:#FFFFFF;
  --success:#1B8A5A; --warning:#E9AA4B; --error:#C13515; --info:#3C8399;
  --primary:var(--rausch-500); --primary-hover:var(--rausch-600); --primary-press:var(--rausch-700); --on-primary:var(--white);
  --accent:var(--lagoon-500);
  --fg-1:var(--ink); --fg-2:var(--gray-600); --fg-3:var(--gray-400);
  --bg:var(--white); --bg-subtle:var(--gray-100); --surface:var(--white);
  --border:var(--gray-300); --border-subtle:var(--gray-200); --link:var(--rausch-500);
  --grad-sunset:linear-gradient(135deg, var(--sunset-coral) 0%, var(--sunset-orange) 45%, var(--sunset-amber) 100%);
  --grad-sunset-to-sea:linear-gradient(160deg, var(--sunset-coral) 0%, var(--sunset-amber) 55%, var(--lagoon-500) 100%);
  --font-sans:'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --fw-light:300; --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700; --fw-extrabold:800;
  --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px; --text-xl:22px; --text-2xl:28px;
  --text-3xl:36px; --text-4xl:46px; --text-5xl:60px; --text-6xl:76px;
  --leading-tight:1.1; --leading-snug:1.25; --leading-normal:1.5; --leading-relaxed:1.65;
  --tracking-tight:-0.02em; --tracking-snug:-0.01em; --tracking-wide:0.04em;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:24px; --radius-pill:999px;
  --shadow-xs:0 1px 2px rgba(0,0,0,0.06); --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
  --shadow-md:0 6px 16px rgba(0,0,0,0.12); --shadow-lg:0 12px 32px rgba(0,0,0,0.16);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px;
  --space-8:48px; --space-10:64px; --space-12:96px;
  --band: #1B1714; --band-2: #241E19; --cream: #FBF7F1; --cream-line: rgba(255,255,255,0.12);
}
.eyebrow { font-weight:var(--fw-bold); font-size:var(--text-xs); line-height:1; letter-spacing:var(--tracking-wide); text-transform:uppercase; color:var(--primary); }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

h1, h2, h3, h4, p { text-wrap: pretty; margin: 0; }

}
@media (min-width: 861px) { .mob-nav { display: none !important; } }
@media (max-width: 560px) { .footer-grid { grid-template-columns: 1fr !important; } }

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
/* ===== primitives.jsx ===== */
/* Curate My Stay : Owner Page · shared primitives
   All components exported to window for cross-file use.
   Brand: Figtree + Airbnb coral-red/white (colors_and_type.css). */

function Icon({ name, size = 20, color = 'currentColor', stroke = 2, style }) {
  const ref = React.useRef(null);
  React.useLayoutEffect(() => {
    const host = ref.current;
    if (!host || !window.lucide) return;
    host.innerHTML = `<i data-lucide="${name}"></i>`;
    window.lucide.createIcons({ attrs: { width: size, height: size, stroke: color, 'stroke-width': stroke } });
  });
  return <span ref={ref} aria-hidden="true" style={{ display: 'inline-flex', width: size, height: size, flex: 'none', ...style }} />;
}

function Logo({ size = 36, showWord = true, word = 'Curate My Stay', light = false }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
      <img src={(window.CMS_IMG && window.CMS_IMG['logo-mark.png']) || 'assets/logo-mark.png'} alt="Curate My Stay" style={{ width: size, height: size, objectFit: 'contain' }} />
      {showWord && (
        <span style={{ fontWeight: 800, fontSize: size * 0.46, letterSpacing: '-0.02em', color: light ? '#fff' : 'var(--ink)', lineHeight: 1, whiteSpace: 'nowrap' }}>
          {word}
        </span>
      )}
    </div>
  );
}

function Button({ children, variant = 'primary', size = 'md', icon, iconRight, onClick, full, type = 'button', style }) {
  const [pressed, setPressed] = React.useState(false);
  const [hover, setHover] = React.useState(false);
  const pad = size === 'lg' ? '16px 28px' : size === 'sm' ? '9px 15px' : '13px 22px';
  const fs = size === 'lg' ? 17 : size === 'sm' ? 14 : 16;
  const base = {
    fontFamily: 'inherit', fontWeight: 600, fontSize: fs, padding: pad,
    borderRadius: 'var(--radius-md)', border: '1px solid transparent', cursor: 'pointer',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9,
    transition: 'all .16s ease', width: full ? '100%' : 'auto',
    transform: pressed ? 'scale(0.98)' : 'none', whiteSpace: 'nowrap', lineHeight: 1.1,
  };
  const variants = {
    primary: { background: pressed ? 'var(--primary-press)' : 'var(--primary)', color: '#fff', boxShadow: hover ? 'var(--shadow-md)' : 'var(--shadow-xs)' },
    secondary: { background: '#fff', color: 'var(--ink)', borderColor: 'var(--border)' },
    ghost: { background: 'transparent', color: 'var(--ink)' },
    onDark: { background: '#fff', color: 'var(--ink)' },
    outlineDark: { background: 'transparent', color: '#fff', borderColor: 'rgba(255,255,255,0.45)' },
  };
  const hoverStyle = hover ? (
    variant === 'primary' ? { background: 'var(--primary-hover)' } :
    variant === 'secondary' || variant === 'ghost' ? { background: 'var(--gray-100)' } :
    variant === 'outlineDark' ? { background: 'rgba(255,255,255,0.10)', borderColor: 'rgba(255,255,255,0.7)' } :
    { background: '#fff', boxShadow: 'var(--shadow-md)' }
  ) : {};
  return (
    <button type={type} onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => { setHover(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
      style={{ ...base, ...variants[variant], ...hoverStyle, ...style }}>
      {icon && <Icon name={icon} size={fs + 2} />}
      {children}
      {iconRight && <Icon name={iconRight} size={fs + 1} />}
    </button>
  );
}

function Pill({ children, tone = 'neutral', dot, style }) {
  const tones = {
    neutral: { bg: '#fff', fg: 'var(--ink)', border: 'var(--border)', dot: 'var(--gray-400)' },
    soft: { bg: 'var(--gray-100)', fg: 'var(--ink-2)', border: 'transparent', dot: 'var(--gray-400)' },
    ok: { bg: '#E6F4EC', fg: 'var(--success)', border: 'transparent', dot: 'var(--success)' },
    info: { bg: 'var(--lagoon-50)', fg: 'var(--lagoon-700)', border: 'transparent', dot: 'var(--lagoon-500)' },
    coral: { bg: 'var(--rausch-50)', fg: 'var(--primary-press)', border: 'transparent', dot: 'var(--primary)' },
    onDark: { bg: 'rgba(255,255,255,0.10)', fg: '#fff', border: 'rgba(255,255,255,0.22)', dot: 'var(--sunset-amber)' },
  };
  const t = tones[tone];
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 7, padding: '6px 13px', borderRadius: 999, fontSize: 13, fontWeight: 600, background: t.bg, color: t.fg, border: `1px solid ${t.border}`, ...style }}>
      {dot && <span style={{ width: 7, height: 7, borderRadius: '50%', background: t.dot }} />}
      {children}
    </span>
  );
}

function Eyebrow({ children, light = false, style }) {
  return (
    <div className="eyebrow" style={{ color: light ? 'var(--sunset-amber)' : 'var(--primary)', ...style }}>{children}</div>
  );
}

/* Real photography. Warm, lightly-polished grade. */
function Img({ src, height, radius = 16, cover = true, alt = '', overlay = false, position = 'center', grade = true, style, children }) {
  return (
    <div style={{ height, borderRadius: radius, overflow: 'hidden', position: 'relative', background: 'var(--gray-100)', ...style }}>
      <img src={(window.CMS_IMG && window.CMS_IMG[src]) || `assets/photos/${src}`} alt={alt} loading="lazy"
        style={{ width: '100%', height: '100%', objectFit: cover ? 'cover' : 'contain', objectPosition: position, display: 'block',
                 filter: grade ? 'saturate(1.06) contrast(1.03) brightness(1.02)' : 'none' }} />
      {overlay && <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(24,15,9,0.62) 0%, rgba(24,15,9,0.12) 42%, rgba(24,15,9,0) 64%)' }} />}
      {children}
    </div>
  );
}

/* Fade-up on scroll. Calm: 8px translate, 520ms, once. */
function Reveal({ children, delay = 0, y = 14, style, as = 'div' }) {
  const ref = React.useRef(null);
  const [shown, setShown] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach(e => { if (e.isIntersecting) { setShown(true); io.disconnect(); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as;
  return (
    <Tag ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? 'none' : `translateY(${y}px)`,
      transition: `opacity .55s cubic-bezier(0.2,0,0,1) ${delay}ms, transform .55s cubic-bezier(0.2,0,0,1) ${delay}ms`,
      ...style,
    }}>{children}</Tag>
  );
}

/* Section shell : consistent vertical rhythm + max width. */
function Section({ children, bg = 'var(--bg)', dark = false, pad = '104px 32px', id, full = false, style }) {
  return (
    <section id={id} data-screen-label={id} style={{ background: bg, color: dark ? '#fff' : 'var(--ink)', position: 'relative', ...style }}>
      <div style={{ maxWidth: full ? 'none' : 1180, margin: '0 auto', padding: pad }}>
        {children}
      </div>
    </section>
  );
}

/* Section heading block (eyebrow + h2 + lead), centered or left. */
function Heading({ eyebrow, title, lead, align = 'center', dark = false, max = 720, style }) {
  return (
    <div style={{ textAlign: align, maxWidth: align === 'center' ? max : 'none', margin: align === 'center' ? '0 auto' : 0, ...style }}>
      {eyebrow && <Eyebrow light={dark} style={{ marginBottom: 16 }}>{eyebrow}</Eyebrow>}
      <h2 style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 800, letterSpacing: '-0.025em', lineHeight: 1.08, margin: 0, color: dark ? '#fff' : 'var(--ink)' }}>{title}</h2>
      {lead && <p style={{ fontSize: 19, lineHeight: 1.6, color: dark ? 'rgba(255,255,255,0.74)' : 'var(--fg-2)', margin: '18px auto 0', maxWidth: align === 'center' ? 640 : 'none' }}>{lead}</p>}
    </div>
  );
}

Object.assign(window, { Icon, Logo, Button, Pill, Eyebrow, Img, Reveal, Section, Heading });

  </script>
  <script type="text/babel" data-presets="react">
/* ===== calculator.jsx ===== */
/* Curate My Stay : ROI Calculator (Section 3)
   Real client-side implementation of the spec's server-side math.
   Multi-step lead-capture form → instant on-screen forecast. */

const CMS_LOCATIONS = ['Panjim','Margao','Saligao','Assagao','Anjuna','Vagator','Candolim','Calangute','Baga','Morjim','Ashvem','Mandrem','Arambol','Varca','Cavelossim','Colva','Loutolim','Other South Goa','Other North Goa'];
const APT_PREMIUM = ['Panjim','Margao','Anjuna','Assagao'];
const SOUTH_COASTAL = ['Varca','Cavelossim','Colva','Loutolim','Other South Goa'];

const fmtINR = (n) => '₹' + Math.round(n).toLocaleString('en-IN');
// Short lakh/crore label for big numbers
function lakhLabel(n) {
  if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2).replace(/\.00$/, '') + ' Cr';
  if (n >= 100000) return '₹' + (n / 100000).toFixed(2).replace(/\.00$/, '') + ' L';
  return fmtINR(n);
}

/* --- The math (anchors from the spec; not shown on screen) --- */
function computeForecast(input) {
  const { type, config, location, distance, pool } = input;
  const isVilla = type === 'Villa';

  // Step 2 : base ADR
  let base;
  if (isVilla) {
    base = ({ 'Studio': 7500, '1 BHK': 7500, '2 BHK': 7500, '3 BHK': 11000, '4 BHK': 14000, '5 BHK+': 18000 })[config] || 9000;
  } else { // Apartment / Studio
    base = ({ 'Studio': 4000, '1 BHK': 4000, '2 BHK': 6500, '3 BHK': 9000, '4 BHK': 12000, '5 BHK+': 15000 })[config] || 5500;
  }

  // multipliers
  let m = 1;
  if (isVilla) {
    if (pool === 'Private') m *= 1.20;
    if (SOUTH_COASTAL.includes(location)) m *= 1.15;
  } else {
    if (APT_PREMIUM.includes(location)) m *= 1.15;
    if (pool === 'Private' || pool === 'Society') m *= 1.10;
  }
  if (distance === '<500m') m *= 1.10;
  const adr = base * m;

  // Step 3 : seasonal occupancy
  const buckets = [
    { nights: 88, mult: 1.40 }, // Peak  (Nov–Feb)
    { nights: 32, mult: 1.00 }, // Shoulder (Oct, Mar)
    { nights: 30, mult: 0.85 }, // Low (Apr, May, Sep)
    { nights: 21, mult: 0.70 }, // Monsoon (Jun–Aug)
  ];
  const gross = buckets.reduce((s, b) => s + b.nights * adr * b.mult, 0);
  const nights = buckets.reduce((s, b) => s + b.nights, 0);
  const opex = gross * 0.15;
  const net = gross - opex;
  const ownerShare = net * 0.80;

  // LTR comparison
  let ltrMonthly;
  if (isVilla) ltrMonthly = ({ '2 BHK': 40000, '3 BHK': 60000, '4 BHK': 85000, '5 BHK+': 110000 })[config] || 45000;
  else ltrMonthly = ({ 'Studio': 12000, '1 BHK': 15000, '2 BHK': 30000, '3 BHK': 45000, '4 BHK': 65000, '5 BHK+': 80000 })[config] || 22000;
  const ltrAnnual = ltrMonthly * 11;

  return { adr, nights, gross, opex, net, ownerShare, ltrAnnual, multiple: ownerShare / ltrAnnual };
}

/* --- Small form atoms --- */
function Field({ label, children, hint, required }) {
  return (
    <label style={{ display: 'block' }}>
      <span style={{ display: 'block', fontSize: 14, fontWeight: 600, color: 'var(--ink-2)', marginBottom: 7 }}>
        {label}{required && <span style={{ color: 'var(--primary)' }}> *</span>}
      </span>
      {children}
      {hint && <span style={{ display: 'block', fontSize: 12.5, color: 'var(--fg-3)', marginTop: 5 }}>{hint}</span>}
    </label>
  );
}
const inputStyle = {
  width: '100%', padding: '12px 14px', fontSize: 15.5, color: 'var(--ink)',
  background: '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
  outline: 'none', transition: 'border-color .15s, box-shadow .15s', appearance: 'none',
};
function TextInput(props) {
  const [f, setF] = React.useState(false);
  return <input {...props} onFocus={() => setF(true)} onBlur={() => setF(false)}
    style={{ ...inputStyle, borderColor: f ? 'var(--primary)' : (props.invalid ? 'var(--error)' : 'var(--border)'), boxShadow: f ? '0 0 0 3px var(--rausch-100)' : 'none' }} />;
}
function Select({ value, onChange, options, placeholder, invalid }) {
  const [f, setF] = React.useState(false);
  return (
    <div style={{ position: 'relative' }}>
      <select value={value} onChange={onChange} onFocus={() => setF(true)} onBlur={() => setF(false)}
        style={{ ...inputStyle, paddingRight: 38, cursor: 'pointer', color: value ? 'var(--ink)' : 'var(--fg-3)',
                 borderColor: f ? 'var(--primary)' : (invalid ? 'var(--error)' : 'var(--border)'), boxShadow: f ? '0 0 0 3px var(--rausch-100)' : 'none' }}>
        <option value="" disabled>{placeholder}</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <span style={{ position: 'absolute', right: 13, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }}>
        <Icon name="chevron-down" size={18} color="var(--fg-2)" />
      </span>
    </div>
  );
}
function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
      {options.map(o => {
        const on = value === o;
        return (
          <button key={o} type="button" onClick={() => onChange(o)}
            style={{ flex: '1 1 0', minWidth: 88, padding: '11px 12px', fontSize: 14.5, fontWeight: 600, cursor: 'pointer',
                     borderRadius: 'var(--radius-md)', border: `1px solid ${on ? 'var(--primary)' : 'var(--border)'}`,
                     background: on ? 'var(--rausch-50)' : '#fff', color: on ? 'var(--primary-press)' : 'var(--ink-2)',
                     transition: 'all .14s ease' }}>{o}</button>
        );
      })}
    </div>
  );
}
function Check({ checked, onChange, children }) {
  return (
    <label style={{ display: 'flex', gap: 12, alignItems: 'flex-start', cursor: 'pointer', padding: '4px 0' }}>
      <span style={{ width: 22, height: 22, flex: 'none', borderRadius: 7, border: `1.5px solid ${checked ? 'var(--primary)' : 'var(--border)'}`,
                     background: checked ? 'var(--primary)' : '#fff', display: 'grid', placeItems: 'center', marginTop: 1, transition: 'all .14s' }}>
        {checked && <Icon name="check" size={15} color="#fff" stroke={3} />}
      </span>
      <span style={{ fontSize: 15, lineHeight: 1.5, color: 'var(--ink-2)' }}>{children}</span>
      <input type="checkbox" checked={checked} onChange={onChange} style={{ display: 'none' }} />
    </label>
  );
}

function Dots({ step, total = 3 }) {
  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
      {Array.from({ length: total }).map((_, i) => (
        <span key={i} style={{ width: i === step ? 22 : 8, height: 8, borderRadius: 99,
          background: i === step ? 'var(--primary)' : i < step ? 'var(--rausch-300)' : 'var(--gray-300)', transition: 'all .2s' }} />
      ))}
    </div>
  );
}

/* --- Output --- */
function NumCard({ label, value, sub, accent }) {
  return (
    <div style={{ background: '#fff', border: `1px solid ${accent ? 'var(--rausch-300)' : 'var(--border-subtle)'}`, borderRadius: 'var(--radius-lg)', padding: '22px 24px', boxShadow: 'var(--shadow-xs)' }}>
      <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', color: accent ? 'var(--primary)' : 'var(--fg-2)' }}>{label}</div>
      <div style={{ fontSize: 34, fontWeight: 800, color: 'var(--ink)', letterSpacing: '-0.02em', marginTop: 8, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 13.5, color: 'var(--fg-2)', marginTop: 7 }}>{sub}</div>}
    </div>
  );
}

function CompareBar({ label, value, pct, tone }) {
  const [w, setW] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(() => setW(pct), 80); return () => clearTimeout(t); }, [pct]);
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
        <span style={{ fontSize: 14.5, fontWeight: 600, color: 'var(--ink-2)' }}>{label}</span>
        <span style={{ fontSize: 16, fontWeight: 800, color: tone === 'coral' ? 'var(--primary)' : 'var(--ink)' }}>{lakhLabel(value)}</span>
      </div>
      <div style={{ height: 16, borderRadius: 99, background: 'var(--gray-100)', overflow: 'hidden' }}>
        <div style={{ height: '100%', width: w + '%', borderRadius: 99,
          background: tone === 'coral' ? 'var(--grad-sunset)' : 'var(--gray-300)',
          transition: 'width 1s cubic-bezier(0.2,0,0,1)' }} />
      </div>
    </div>
  );
}

function Forecast({ input, result, onReset }) {
  const summary = `${input.config} ${input.type} · ${input.location} · ${input.area ? input.area + ' sqft · ' : ''}${input.pool} pool`;
  const maxV = Math.max(result.ownerShare, result.ltrAnnual);
  return (
    <Reveal>
      <div style={{ background: 'var(--cream)', border: '1px solid var(--rausch-300)', borderRadius: 'var(--radius-xl)', padding: 'clamp(24px, 4vw, 40px)', boxShadow: 'var(--shadow-md)' }}>

          <Pill tone="ok" dot>Forecast ready</Pill>
          <span style={{ fontSize: 13.5, color: 'var(--fg-2)' }}>Pitch deck on its way to your inbox</span>
        </div>
        <h3 style={{ fontSize: 'clamp(24px,3vw,32px)', fontWeight: 800, letterSpacing: '-0.02em', margin: '8px 0 4px', color: 'var(--ink)' }}>Here's what your property could earn.</h3>
        <p style={{ fontSize: 15, color: 'var(--fg-2)', margin: '0 0 24px', fontWeight: 600 }}>{summary}</p>

        <div className="grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <NumCard label="Estimated annual revenue" value={lakhLabel(result.gross)} sub={`~${result.nights} nights · ₹${Math.round(result.adr).toLocaleString('en-IN')} avg/night`} />
          <NumCard label="Estimated operating cost" value={lakhLabel(result.opex)} sub="15% : cleaning, ops, listings" />
          <NumCard label="Estimated net profit" value={lakhLabel(result.net)} sub="After all operating costs" />
          <NumCard label="Your share (80%)" value={lakhLabel(result.ownerShare)} sub="Paid to you, monthly" accent />
        </div>

        <div style={{ background: '#fff', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 'clamp(20px,3vw,28px)', marginTop: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18, flexWrap: 'wrap', gap: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--fg-2)' }}>You earn, vs a long-term lease</span>
            <Pill tone="coral">{result.multiple.toFixed(1)}× more</Pill>
          </div>
          <CompareBar label="Long-term rental (estimate)" value={result.ltrAnnual} pct={(result.ltrAnnual / maxV) * 100} />
          <CompareBar label="Short-term with CMS" value={result.ownerShare} pct={(result.ownerShare / maxV) * 100} tone="coral" />
        </div>

        <p style={{ fontSize: 12.5, fontStyle: 'italic', color: 'var(--fg-3)', lineHeight: 1.5, margin: '18px 0 22px' }}>
          These are estimates based on our experience managing comparable Goa properties. Actual results depend on property condition, location, season, and market dynamics. The detailed pitch deck on its way to your inbox includes the assumptions behind these numbers.
        </p>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          <Button variant="primary" size="lg" iconRight="arrow-right" onClick={() => window.cmsBookCall && window.cmsBookCall()}>Book a discovery call</Button>
          <Button variant="secondary" size="lg" icon="mail">Email me the full pitch deck</Button>
          <Button variant="ghost" size="lg" icon="rotate-ccw" onClick={onReset}>Start over</Button>
        </div>
      </div>
    </Reveal>
  );
}

function Calculator() {
  const [step, setStep] = React.useState(0);
  const [data, setData] = React.useState({
    type: '', config: '', area: '', location: '', mapLink: '', distance: '', pool: '', amenities: '',
    furnishing: '', rented: '', listingUrl: '',
    name: '', phone: '', email: '', residency: '',
    wantDeck: true, wantCall: false,
  });
  const [result, setResult] = React.useState(null);
  const [touched, setTouched] = React.useState(false);
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));

  const step1ok = data.type && data.config && data.location && data.distance && data.pool && data.furnishing;
  const emailOk = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(data.email);
  const step2ok = data.name.trim() && data.phone.trim().length >= 7 && emailOk && data.residency;

  const next = () => { setTouched(true); if ((step === 0 && step1ok) || (step === 1 && step2ok)) { setTouched(false); setStep(s => s + 1); } };
  const submit = () => { setResult(computeForecast(data)); };
  const reset = () => { setResult(null); setStep(0); setTouched(false);
    setData({ type: '', config: '', area: '', location: '', mapLink: '', distance: '', pool: '', amenities: '', furnishing: '', rented: '', listingUrl: '', name: '', phone: '', email: '', residency: '', wantDeck: true, wantCall: false }); };

  if (result) return <Forecast input={data} result={result} onReset={reset} />;

  const showAirbnbUrl = data.rented === 'Yes, on Airbnb (self-managed)';

  return (
    <div style={{ background: 'var(--cream)', border: '1px solid var(--border)', borderRadius: 'var(--radius-xl)', padding: 'clamp(24px, 4vw, 44px)', boxShadow: 'var(--shadow-sm)' }}>

          <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--ink)', marginTop: 4 }}>
            {['Tell us about your property', 'How do we reach you?', 'Confirm & generate'][step]}
          </div>
        </div>
        <Dots step={step} />
      </div>

      {step === 0 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }} className="grid-2">
          <Field label="Property type" required><Segmented value={data.type} onChange={v => set('type', v)} options={['Apartment', 'Villa', 'Studio']} /></Field>
          <Field label="Configuration" required><Select value={data.config} onChange={e => set('config', e.target.value)} placeholder="Select size" options={['Studio', '1 BHK', '2 BHK', '3 BHK', '4 BHK', '5 BHK+']} invalid={touched && !data.config} /></Field>
          <Field label="Built-up area (sq.ft.)" hint="Rough is fine"><TextInput type="number" placeholder="e.g. 1800" value={data.area} onChange={e => set('area', e.target.value)} /></Field>
          <Field label="Location" required><Select value={data.location} onChange={e => set('location', e.target.value)} placeholder="Select area" options={CMS_LOCATIONS} invalid={touched && !data.location} /></Field>
          <Field label="Distance from beach" required><Select value={data.distance} onChange={e => set('distance', e.target.value)} placeholder="Select distance" options={['<500m', '500m-1km', '1-2km', '2-5km', '5km+']} invalid={touched && !data.distance} /></Field>
          <Field label="Pool" required><Segmented value={data.pool} onChange={v => set('pool', v)} options={['Private', 'Society', 'None']} /></Field>
          <Field label="Furnishing status" required><Select value={data.furnishing} onChange={e => set('furnishing', e.target.value)} placeholder="Select status" options={['Fully furnished & ready', 'Mostly furnished, needs minor work', 'Needs significant work', 'Empty']} invalid={touched && !data.furnishing} /></Field>
          <Field label="Currently being rented?"><Select value={data.rented} onChange={e => set('rented', e.target.value)} placeholder="Select" options={['No, idle', 'Yes, long-term', 'Yes, on Airbnb (self-managed)', 'Yes, with another agency']} /></Field>
          {showAirbnbUrl && <div style={{ gridColumn: '1 / -1' }}><Field label="Your Airbnb listing URL" hint="Optional : lets us run a free listing audit"><TextInput type="url" placeholder="https://airbnb.com/rooms/…" value={data.listingUrl} onChange={e => set('listingUrl', e.target.value)} /></Field></div>}
          {touched && !step1ok && <div style={{ gridColumn: '1 / -1', fontSize: 13.5, color: 'var(--error)' }}>Please complete the required fields above.</div>}
        </div>
      )}

      {step === 1 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }} className="grid-2">
          <Field label="Full name" required><TextInput placeholder="Your name" value={data.name} onChange={e => set('name', e.target.value)} invalid={touched && !data.name.trim()} /></Field>
          <Field label="Phone" required hint="Default +91 : change for international">
            <div style={{ display: 'flex', gap: 8 }}>
              <span style={{ ...inputStyle, width: 64, flex: 'none', display: 'grid', placeItems: 'center', fontWeight: 600, background: 'var(--gray-100)' }}>+91</span>
              <TextInput type="tel" placeholder="98765 43210" value={data.phone} onChange={e => set('phone', e.target.value)} invalid={touched && data.phone.trim().length < 7} />
            </div>
          </Field>
          <Field label="Email" required><TextInput type="email" placeholder="you@email.com" value={data.email} onChange={e => set('email', e.target.value)} invalid={touched && !emailOk} /></Field>
          <Field label="Where are you based?" required hint="Helps us route your follow-up"><Select value={data.residency} onChange={e => set('residency', e.target.value)} placeholder="Select" options={['In Goa', 'In India (outside Goa)', 'Abroad (NRI)']} invalid={touched && !data.residency} /></Field>
          {touched && !step2ok && <div style={{ gridColumn: '1 / -1', fontSize: 13.5, color: 'var(--error)' }}>Please enter your name, a valid phone & email, and where you're based.</div>}
        </div>
      )}

      {step === 2 && (
        <div style={{ display: 'grid', gap: 14 }}>
          <div style={{ background: '#fff', border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: 18 }}>

          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 13.5, color: 'var(--fg-2)' }}>
            <Icon name="shield-check" size={18} color="var(--success)" /> No spam. Your details stay private. We reply within minutes.
          </div>
        </div>
      )}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 28, gap: 12 }}>
        {step > 0 ? <Button variant="ghost" icon="arrow-left" onClick={() => setStep(s => s - 1)}>Back</Button> : <span />}
        {step < 2
          ? <Button variant="primary" size="lg" iconRight="arrow-right" onClick={next}>Continue</Button>
          : <Button variant="primary" size="lg" iconRight="sparkles" onClick={submit}>Generate my forecast</Button>}
      </div>
    </div>
  );
}

/* Revenue ramp chart */
function RampChart({ data }) {
  const w = 360, h = 130, pad = 8;
  const max = Math.max(...data.map(d => d.v));
  const step = (w - pad * 2) / (data.length - 1);
  const pts = data.map((d, i) => [pad + i * step, h - pad - (d.v / max) * (h - pad - 22)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = line + ` L ${pts[pts.length - 1][0].toFixed(1)} ${h - pad} L ${pts[0][0].toFixed(1)} ${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="rampfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="var(--sunset-coral)" stopOpacity="0.28" />
          <stop offset="1" stopColor="var(--sunset-coral)" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill="url(#rampfill)" />
      <path d={line} fill="none" stroke="var(--primary)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => {
        const peak = data[i].v === max;
        return <circle key={i} cx={p[0]} cy={p[1]} r={peak ? 4.5 : 3} fill={peak ? 'var(--primary)' : '#fff'} stroke="var(--primary)" strokeWidth="2" />;
      })}
      {data.map((d, i) => <text key={i} x={pts[i][0]} y={h - 1} fontSize="9" fill="var(--fg-3)" textAnchor="middle" fontWeight="600">{d.m}</text>)}
    </svg>
  );
}

  const [idx, setIdx] = React.useState(0);

            objectFit: 'cover', objectPosition: photoPos || 'center',
            opacity: i === (idx % photos.length) ? 1 : 0,
            transition: 'opacity 1s ease-in-out',
            filter: 'saturate(1.06) contrast(1.03) brightness(1.02)',
          }} />
      ))}
      {photos && photos.length > 1 && (
        <div style={{ position: 'absolute', bottom: 12, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 5, zIndex: 2 }}>
          {photos.map((_, i) => (
            <button key={i} onClick={() => setIdx(i)}
              style={{ width: i === (idx % photos.length) ? 18 : 7, height: 7, borderRadius: 99, border: 'none', cursor: 'pointer',
                background: i === (idx % photos.length) ? '#fff' : 'rgba(255,255,255,0.5)',
                transition: 'all .3s ease', padding: 0 }} />
          ))}
        </div>
      )}
    </div>
  );
  const copy = (
    <div>
      <Eyebrow style={{ marginBottom: 14 }}>{eyebrow}</Eyebrow>
      <h3 style={{ fontSize: 'clamp(24px,2.8vw,32px)', fontWeight: 800, letterSpacing: '-0.02em', lineHeight: 1.12, margin: '0 0 6px', color: 'var(--ink)' }}>{title}</h3>

    ['\u201CWhat about TDS and tax compliance?\u201D', 'We deduct 10% TDS on your share, deposit it with the government monthly, and share quarterly TDS filings ready for your CA. NRIs receive Form 16A on request. Your accountant gets everything they need.'],
    ['\u201CWhat if you can\'t fill the property?\u201D', 'We share occupancy projections in your custom pitch deck before you sign. If actuals fall materially below projection for two consecutive months, we trigger a joint review : pricing, listing, or operations : at no cost.'],
  ];
  const [open, setOpen] = React.useState(0);
  const half = Math.ceil(faqs.length / 2);
  const cols = [faqs.slice(0, half), faqs.slice(half)];
  return (
    <Section bg="var(--cream)" pad="100px 32px" id="risk">

        <Heading align="center" eyebrow="Risk & objections"
          title="What could go wrong. And what we've already done about it."

      <div className="grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 48, alignItems: 'start' }}>

              return <AccordionItem key={f[0]} q={f[0]} a={f[1]} open={open === idx} onToggle={() => setOpen(open === idx ? -1 : idx)} />;

          </div>
        ))}
      </div>
    </Section>
  );
}

function StickyBar() {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 700);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div className="sticky-bar" style={{ position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 80, display: 'none',
      padding: '12px 16px calc(12px + env(safe-area-inset-bottom))', background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(12px)',
      borderTop: '1px solid var(--border-subtle)', transform: show ? 'translateY(0)' : 'translateY(110%)', transition: 'transform .3s ease', gap: 10 }}>
      <Button variant="secondary" size="md" icon="message-circle" onClick={() => window.cmsWhatsApp()} style={{ flex: 'none' }} />
      <Button variant="primary" full size="md" iconRight="arrow-right" onClick={() => window.cmsBookCall()}>Book a discovery call</Button>
    </div>
  );
}

function App() {
  const [booking, setBooking] = React.useState(false);
  React.useEffect(() => {
    window.cmsBookCall = () => setBooking(true);

      <BookingModal open={booking} onClose={() => setBooking(false)} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
