       ═══════════════════════════════════════════════════════════ -->
  <style>
/* CurateMyStay dashboard styles */
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F5F4EE;
  --border: #E6E4DC;
  --border-strong: #D6D3C7;
  --ink: #1A1A1A;
  --ink-2: #4A4A48;
  --ink-3: #8A8A86;
  --ink-4: #B8B6AF;
  --brand: #E5484D;
  --brand-ink: #C2363A;
  --brand-soft: #FCEDEE;
  --orange: #F4A258;
  --orange-soft: #FDF0E0;
  --teal: #3D8CA8;
  --teal-soft: #E5F1F5;
  --green: #2F8F4E;
  --green-soft: #E6F4EA;
  --amber: #C58A00;
  --amber-soft: #FBF1D6;
  --shadow-sm: 0 1px 2px rgba(20, 18, 14, 0.04);
  --shadow-md: 0 4px 16px rgba(20, 18, 14, 0.06);
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --sidebar-w: 232px;
  --topbar-h: 60px;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: 'Figtree', system-ui, sans-serif;
  font-size: 14px;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  font-variant-numeric: tabular-nums;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

/* App shell */
.app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

/* Sidebar */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 12px;
  position: sticky; top: 0; align-self: start;
  height: 100vh;
  display: flex; flex-direction: column;
}
.sidebar__logo { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; }
.sidebar__logo img { width: 34px; height: 34px; object-fit: contain; border-radius: 8px; background: var(--surface-2); }
.sidebar__logo .name { font-weight: 700; letter-spacing: -0.01em; font-size: 15px; }
.sidebar__logo .sub { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-top: 1px; }
.sidebar__section { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-4); font-weight: 600; padding: 14px 10px 6px; }
.nav { display: flex; flex-direction: column; gap: 1px; }
.nav__item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  font-weight: 500; color: var(--ink-2);
  background: transparent; border: none; text-align: left; width: 100%;
  font-size: 13.5px;
}
.nav__item:hover { background: var(--surface-2); color: var(--ink); }
.nav__item--active { background: var(--brand-soft); color: var(--brand-ink); }
.nav__item--active .nav__icon { color: var(--brand); }
.nav__icon { width: 16px; height: 16px; flex: none; color: var(--ink-3); }
.nav__item--active .nav__icon { color: var(--brand); }
.nav__badge { margin-left: auto; font-size: 10.5px; background: var(--brand); color: white; padding: 1px 6px; border-radius: 999px; font-weight: 600; }
.sidebar__footer { margin-top: auto; padding: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--brand); color: white; display: grid; place-items: center; font-weight: 700; font-size: 12px; flex: none; }
.sidebar__footer .who { font-size: 12.5px; font-weight: 600; line-height: 1.2; }
.sidebar__footer .role { font-size: 11px; color: var(--ink-3); }

/* Top bar */
.topbar {
  height: var(--topbar-h);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px;
  position: sticky; top: 0; z-index: 10;
}
.topbar h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.topbar .crumb { color: var(--ink-3); font-size: 13px; font-weight: 500; }
.topbar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.persona {
  display: inline-flex; padding: 3px; background: var(--surface-2);
  border-radius: 8px; border: 1px solid var(--border);
}
.persona button {
  border: none; background: transparent; padding: 5px 12px; border-radius: 6px;
  font-size: 12.5px; font-weight: 600; color: var(--ink-3);
}
.persona button.active { background: white; color: var(--ink); box-shadow: var(--shadow-sm); }

/* Page */
.page { padding: 24px 28px 60px; }
.page__head { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.page__title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
.page__sub { color: var(--ink-3); font-size: 13.5px; margin-top: 4px; max-width: 680px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  border: 1px solid var(--border-strong);
  background: white; color: var(--ink);
  transition: all 0.12s ease;
}
.btn:hover { background: var(--surface-2); }
.btn--primary { background: var(--brand); color: white; border-color: var(--brand); }
.btn--primary:hover { background: var(--brand-ink); border-color: var(--brand-ink); }
.btn--ghost { border-color: transparent; background: transparent; }
.btn--ghost:hover { background: var(--surface-2); }
.btn--sm { padding: 5px 10px; font-size: 12px; }
.btn--icon { padding: 7px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.card__head { padding: 16px 18px 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.card__title { font-size: 13.5px; font-weight: 600; color: var(--ink); margin: 0; }
.card__sub { font-size: 12px; color: var(--ink-3); }
.card__body { padding: 16px 18px 18px; }

/* KPI tiles */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px 18px; }
.kpi__label { font-size: 12px; color: var(--ink-3); font-weight: 500; }
.kpi__value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-top: 6px; }
.kpi__delta { font-size: 12px; font-weight: 600; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
.kpi__delta--up { color: var(--green); }
.kpi__delta--down { color: var(--brand); }
.kpi__delta--neutral { color: var(--ink-3); }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table thead th {
  text-align: left; font-weight: 600; color: var(--ink-3);
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.05em;
  background: var(--surface);
}
.table tbody td {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.table tbody tr:hover td { background: #FBFAF5; }
.table tbody tr:last-child td { border-bottom: none; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.table td .muted { color: var(--ink-3); font-size: 12px; }
.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Tags */
.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  background: var(--surface-2); color: var(--ink-2);
  border: 1px solid var(--border);
}
.tag .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.tag--brand { background: var(--brand-soft); color: var(--brand-ink); border-color: #F5D7D9; }
.tag--orange { background: var(--orange-soft); color: #B36A1E; border-color: #F4DBB7; }
.tag--teal { background: var(--teal-soft); color: #266076; border-color: #CDE3EB; }
.tag--green { background: var(--green-soft); color: #1E6A37; border-color: #C9E3D2; }
.tag--amber { background: var(--amber-soft); color: #8B6300; border-color: #EDDFB1; }
.tag--neutral { background: var(--surface-2); color: var(--ink-2); border-color: var(--border); }

/* Form */
.field { display: flex; flex-direction: column; gap: 5px; }
.field > label { font-size: 12px; font-weight: 600; color: var(--ink-2); }
.field input, .field select, .field textarea {
  background: white; border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 8px 11px; font-size: 13px;
  transition: border-color 0.12s, box-shadow 0.12s;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(229, 72, 77, 0.12);
}
.field .hint { font-size: 11.5px; color: var(--ink-3); }

/* Segmented */
.seg { display: inline-flex; background: var(--surface-2); padding: 3px; border-radius: 8px; border: 1px solid var(--border); gap: 2px; }
.seg button { border: none; background: transparent; padding: 5px 11px; border-radius: 6px; font-size: 12.5px; font-weight: 600; color: var(--ink-3); }
.seg button.active { background: white; color: var(--ink); box-shadow: var(--shadow-sm); }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(20, 18, 14, 0.36); display: grid; place-items: center; z-index: 100; padding: 20px; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 540px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); overflow: hidden; max-height: 92vh; display: flex; flex-direction: column; }
.modal__head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal__title { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
.modal__body { padding: 18px 20px; overflow: auto; }
.modal__foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--surface-2); }

/* Layout helpers */
.row { display: flex; gap: 14px; }
.col { display: flex; flex-direction: column; gap: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
.span-8 { grid-column: span 8; }
.span-4 { grid-column: span 4; }
.span-6 { grid-column: span 6; }
.span-7 { grid-column: span 7; }
.span-5 { grid-column: span 5; }

.divider { border-top: 1px solid var(--border); margin: 14px 0; }

/* Bar / chart */
.bar-track { background: var(--surface-2); border-radius: 999px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--brand); border-radius: 999px; }

/* Calendar */
.cal { display: grid; grid-template-columns: 200px repeat(31, minmax(28px, 1fr)); gap: 0; font-size: 12px; }
.cal__cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 38px; position: relative; }
.cal__head { background: var(--surface-2); padding: 6px 8px; font-weight: 600; color: var(--ink-3); border-bottom: 1px solid var(--border-strong); font-size: 11px; text-align: center; }
.cal__rowhead { padding: 10px 12px; font-weight: 600; background: var(--surface); border-right: 1px solid var(--border-strong); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.cal__bar { position: absolute; top: 6px; bottom: 6px; left: 2px; right: 2px; background: var(--brand-soft); border: 1px solid var(--brand); border-radius: 6px; padding: 0 8px; display: flex; align-items: center; font-size: 11.5px; font-weight: 600; color: var(--brand-ink); white-space: nowrap; overflow: hidden; cursor: pointer; }
.cal__bar--airbnb { background: var(--brand-soft); border-color: var(--brand); color: var(--brand-ink); }
.cal__bar--booking { background: var(--teal-soft); border-color: var(--teal); color: #266076; }
.cal__bar--direct { background: var(--green-soft); border-color: var(--green); color: #1E6A37; }
.cal__bar--block { background: repeating-linear-gradient(45deg, #ECEAE2, #ECEAE2 6px, #F5F4EE 6px, #F5F4EE 12px); border-color: var(--border-strong); color: var(--ink-3); }
.cal__weekend { background: #FBF9F0; }
.cal__today { background: #FFF6E0; }

/* Empty */
.empty { padding: 36px; text-align: center; color: var(--ink-3); }

/* Misc */
.searchbar { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; min-width: 220px; }
.searchbar input { background: transparent; border: none; outline: none; flex: 1; font-size: 13px; }
.searchbar svg { color: var(--ink-3); }

.checkbox { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
.checkbox input { accent-color: var(--brand); width: 15px; height: 15px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: white; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 200; animation: toast-in 0.2s ease; }
@keyframes toast-in { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

.progress-ring { transform: rotate(-90deg); }
.progress-ring circle { fill: none; stroke-width: 8; }
.progress-ring .bg { stroke: var(--surface-2); }
.progress-ring .fg { stroke: var(--brand); stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }

.list { display: flex; flex-direction: column; }
.list__item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.list__item:last-child { border-bottom: none; }

.dispute-banner { background: var(--amber-soft); border: 1px solid #EDDFB1; padding: 12px 14px; border-radius: 10px; font-size: 13px; color: #6B4F00; display: flex; gap: 10px; align-items: start; }

@media (max-width: 1100px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .grid-12 { grid-template-columns: 1fr; }
  .span-5, .span-7, .span-8, .span-4, .span-6 { grid-column: span 1; }
  .page { padding: 16px 14px 40px; }
  main { min-width: 0; overflow-x: hidden; }
}
@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .topbar { padding: 0 14px; }
  .kpis { grid-template-columns: 1fr; }
}

  </style>

function Toast({ msg, onDone }) {

  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

function Sparkline({ data, color = "#E5484D", height = 38, width = 120, fill = true }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1 || 1);
  const pts = data.map((v, i) => [i * step, height - ((v - min) / range) * (height - 4) - 2]);
  const d = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = d + ` L${width} ${height} L0 ${height} Z`;
  return (
    <svg width={width} height={height} style={{display:"block"}}>
      {fill && <path d={area} fill={color} opacity="0.12" />}
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function BarChart({ series, height = 160, color = "var(--brand)", labels }) {
  const m = Math.max(...series, 1);
  return (
    <div style={{display:"flex", alignItems:"flex-end", gap:8, height}}>
      {series.map((v, i) => (
        <div key={i} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:6, height:"100%"}}>
          <div style={{flex:1, width:"100%", display:"flex", alignItems:"flex-end"}}>
            <div style={{width:"100%", height: ((v / m) * 100) + "%", background: i === series.length-1 ? color : "var(--surface-2)", border: "1px solid " + (i === series.length-1 ? color : "var(--border-strong)"), borderRadius:"6px 6px 0 0", minHeight: 4}} title={SHORT_INR(v)} />
          </div>
          {labels && <div style={{fontSize:11, color:"var(--ink-3)", fontWeight:600}}>{labels[i]}</div>}
        </div>
      ))}
    </div>
  );
}

function DonutChart({ data, size = 140, stroke = 18 }) {
  const total = data.reduce((a, d) => a + d.value, 0) || 1;
  const r = (size - stroke) / 2;
  const cx = size/2, cy = size/2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size}>
      {data.map((d, i) => {
        const len = (d.value / total) * circ;
        const dashOffset = circ - offset;
        offset += len;
        return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={stroke} strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={dashOffset} transform={`rotate(-90 ${cx} ${cy})`} />;
      })}
    </svg>
  );
}

    "scheduled": { color:"var(--teal)", label:"Scheduled" },
    "open": { color:"var(--brand)", label:"Open" },
    "resolved": { color:"var(--green)", label:"Resolved" },
  };
  const m = map[status] || { color:"var(--ink-4)", label:status };
  return (
    <span style={{display:"inline-flex", alignItems:"center", gap:6, fontSize:12.5, fontWeight:600, color:"var(--ink-2)"}}>
      <span style={{width:8, height:8, borderRadius:"50%", background:m.color}} />
      {m.label}
    </span>
  );
}

/* ─── Owner message generator ─── */
function generateOwnerMessage({ ownerName, propertyName, month, revenue, expenses, profitOwnerPct = 80, tdsPct = 10 }) {
  const profit = revenue - expenses;
  const ownerShare = Math.round(profit * (profitOwnerPct / 100));
  const mgmtShare = profit - ownerShare;
  const tds = Math.round(ownerShare * (tdsPct / 100));
  const finalAmount = ownerShare - tds;
  return `Good evening ${ownerName},
Hope all is well. Sharing our ${month} summary below (for ${propertyName})

Summary of ${month} - ${propertyName}

Total Revenue: INR ${Math.round(revenue).toLocaleString("en-IN")}
Total Expenses: INR ${Math.round(expenses).toLocaleString("en-IN")}
Profit : Revenue - Expense = INR ${Math.round(profit).toLocaleString("en-IN")}

Profit Shared to Owner (${profitOwnerPct}%) = INR ${ownerShare.toLocaleString("en-IN")}
Profit Shared to Management Company (${100 - profitOwnerPct}%) = INR ${mgmtShare.toLocaleString("en-IN")}

TDS (${tdsPct}% to be cut since limit is hit)
= ${tdsPct}% × ${ownerShare.toLocaleString("en-IN")} = ${tds.toLocaleString("en-IN")}

Amount to be sent for the month of ${month}
= ${100-tdsPct}% × ${ownerShare.toLocaleString("en-IN")} = ${finalAmount.toLocaleString("en-IN")}

${propertyName} PnL - ${month} Sheet
(View on CurateMyStay Dashboard)`;
}

/* ─── TDS summary generator ─── */
function generateTDSSummary(store, month, tdsPct = 10) {
  let lines = [`Total TDS to be cut for the month of ${month}:\n`];
  let total = 0;
  PROPERTIES.forEach((p, i) => {
    const rev = store.bookings.filter(b => b.property === p.id).reduce((s,b) => s+b.total, 0);
    const exp = store.expenses.filter(e => e.property === p.id).reduce((s,e) => s+e.amount, 0);
    const profit = rev - exp;
    const ownerShare = Math.round(profit * 0.8);
    const tds = Math.round(ownerShare * (tdsPct/100));
    total += tds;
    lines.push(`[${i+1}] ${p.name} (${p.owner})\n= ${tdsPct}% × ${INR(ownerShare)} = ${INR(tds)}\n--------`);
  });
  lines.push(`\nNet Total: ${INR(total)}`);
  return lines.join("\n");
}

function generateMgmtProfitSummary(store, month) {
  let lines = [`Management Company Profit Share - ${month}\n`];
  let total = 0;
  PROPERTIES.forEach((p, i) => {
    const rev = store.bookings.filter(b => b.property === p.id).reduce((s,b) => s+b.total, 0);
    const exp = store.expenses.filter(e => e.property === p.id).reduce((s,e) => s+e.amount, 0);
    const mgmt = Math.round((rev - exp) * 0.2);
    total += mgmt;
    lines.push(`[${i+1}] ${p.name}\n= ${INR(mgmt)}\n--------`);
  });
  lines.push(`\nTotal Management Profit: ${INR(total)}`);
  return lines.join("\n");
}

});

                {bookings.slice(0,5).map(b => (
                  <div className="list__item" key={b.id}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600, fontSize:13}}>{b.guest}</div>
                      <div className="muted">{fmtDate(b.checkIn)} → {fmtDate(b.checkOut)} · {b.nights}n</div>
                      {b.mobile && <a href={"https://wa.me/" + (b.mobile||"").replace(/[^0-9]/g,"")} target="_blank" rel="noopener" style={{fontSize:11, color:"var(--teal)", textDecoration:"none"}}>{b.mobile} (WhatsApp)</a>}
                    </div>
                    <Tag tone={catTone(b.source)}>{b.source}</Tag>
                    <div style={{fontWeight:700, fontSize:13, minWidth:60, textAlign:"right"}}>{SHORT_INR(b.total)}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Expenses section with toggle */}
        <div className="span-12 card">
          <div className="card__head">
            <div className="card__title">Property Expenses</div>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              <div className="seg">
                <button className={expenseView==="all"?"active":""} onClick={()=>setExpenseView("all")}>All expenses</button>
                <button className={expenseView==="summary"?"active":""} onClick={()=>setExpenseView("summary")}>By category</button>
              </div>
              <span className="muted" style={{fontSize:12}}>{expenses.length} entries · {INR(totalExp)}</span>
            </div>
          </div>
          <div className="card__body" style={{padding:0}}>
            {expenseView === "summary" && (
              <div style={{padding:"16px 18px"}}>
                <div className="col" style={{gap:10}}>
                  {expByCategory.map(c => (
                    <div key={c.label} style={{display:"grid", gridTemplateColumns:"200px 1fr 90px", gap:10, alignItems:"center"}}>
                      <div style={{fontSize:13, fontWeight:500}}><Tag tone={catTone(c.label)}>{c.label}</Tag></div>
                      <div className="bar-track"><div className="bar-fill" style={{width: ((c.total/(totalExp||1))*100)+"%", background:"var(--brand)"}} /></div>
                      <div className="num" style={{fontWeight:700, fontSize:13}}>{INR(c.total)}</div>
                    </div>
                  ))}
                  {expByCategory.length === 0 && <div className="empty">No expenses logged</div>}
                </div>

            {expenseView === "all" && (
              <div className="table-scroll">
                <table className="table">
                  <thead><tr><th>Date</th><th>Category</th><th>Vendor / Note</th><th className="num">Amount</th></tr></thead>

                        <td className="num" style={{fontWeight:700}}>{INR(e.amount)}</td>
                      </tr>
                    ))}
                    {expenses.length === 0 && <tr><td colSpan="4" className="empty">No expenses logged for this property</td></tr>}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>

        {/* Queries & disputes — full width, properly visible */}
        <div className="span-12 card" style={{marginTop:0}}>
          <div className="card__head"><div className="card__title">Queries & Disputes</div><div className="card__sub">{myDisputes.length} total</div></div>
          <div className="card__body table-scroll" style={{padding:0}}>
            <table className="table">
              <thead><tr><th>Raised</th><th>Topic</th><th className="num">Amount</th><th>Status</th><th>Note</th></tr></thead>
              <tbody>
                {myDisputes.length === 0 && <tr><td colSpan="5" className="empty">No queries raised. Everything looks aligned.</td></tr>}

                  <tr key={d.id}><td>{fmtDate(d.date)}</td><td style={{fontWeight:600}}>{d.topic}</td><td className="num">{INR(d.amount)}</td><td><StatusDot status={d.status} /></td><td className="muted">{d.note}</td></tr>

      {msgModal && <OwnerMessageModal propertyId={selectedProp} store={store} onClose={() => setMsgModal(false)} onToast={onToast} />}
    </div>
  );
}

function DisputeModal({ properties, defaultProperty, onClose, onSubmit }) {

}

function ApproveModal({ property, amount, onClose, onApprove }) {

        </label>

  );
}

  <script type="text/babel">
/* CurateMyStay v3 — Pages: Calendar, Housekeeping & Laundry, Statistical Forma Sheet */
const { useState: useStateC } = React;

/* ───────── BOOKING CALENDAR ───────── */
function PageCalendar({ store, dispatch, onToast }) {
  const [calMonth, setCalMonth] = useStateC(4); // 0-indexed: 4 = May
  const [calYear, setCalYear] = useStateC(2026);
  const [popup, setPopup] = useStateC(null); // { booking, x, y }

  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  const today = calMonth === 4 && calYear === 2026 ? 23 : -1;
  const dayList = Array.from({length: days}, (_, i) => i + 1);

  const dayHeaders = dayList.map(d => {
    const wd = new Date(calYear, calMonth, d).getDay();
    return { day: d, label: ["S","M","T","W","T","F","S"][wd], isWeekend: wd === 0 || wd === 6 };
  });

  const propRows = PROPERTIES.map(p => {
    const bars = store.bookings.filter(b => b.property === p.id).map(b => {
      const start = new Date(b.checkIn), end = new Date(b.checkOut);
      const sM = start.getMonth(), sY = start.getFullYear();
      const eM = end.getMonth(), eY = end.getFullYear();
      // Only show if overlaps current month
      if ((sY > calYear || (sY === calYear && sM > calMonth)) && (eY > calYear || (eY === calYear && eM > calMonth))) return null;
      if ((sY < calYear || (sY === calYear && sM < calMonth)) && (eY < calYear || (eY === calYear && eM < calMonth))) return null;
      const startDay = (sY === calYear && sM === calMonth) ? start.getDate() : 1;
      const endDay = (eY === calYear && eM === calMonth) ? end.getDate() - 1 : days;
      if (endDay < 1 || startDay > days) return null;
      return { ...b, startDay: Math.max(1, startDay), endDay: Math.min(days, endDay) };
    }).filter(Boolean);
    return { ...p, bars };
  });

  const navMonth = (delta) => {
    let m = calMonth + delta;
    let y = calYear;
    if (m > 11) { m = 0; y++; }
    if (m < 0) { m = 11; y--; }
    setCalMonth(m); setCalYear(y);
  };

  const handleBarClick = (e, booking) => {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    setPopup({ booking, x: rect.left + rect.width / 2, y: rect.bottom + 8 });
  };

  return (
    <div className="page" onClick={() => setPopup(null)}>
      <div className="page__head">
        <div>
          <h2 className="page__title">Booking Calendar</h2>
          <div className="page__sub">Consolidated view across all properties and months.</div>
        </div>
      </div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
        <div style={{display:"flex", gap:10, alignItems:"center"}}>
          <button className="btn btn--ghost" onClick={() => navMonth(-1)}>← Prev</button>
          <div style={{fontSize:17, fontWeight:700, minWidth:160, textAlign:"center"}}>{monthNames[calMonth]} {calYear}</div>
          <button className="btn btn--ghost" onClick={() => navMonth(1)}>Next →</button>
        </div>
        <div style={{display:"flex", gap:14, fontSize:12, color:"var(--ink-2)", alignItems:"center", flexWrap:"wrap"}}>
          {["Airbnb","Social Media","Third Party","Self","Past Tenant"].map(s => (
            <span key={s} style={{display:"flex", alignItems:"center", gap:5}}><span style={{width:10, height:10, borderRadius:3, background: catTone(s)==="brand"?"var(--brand-soft)":catTone(s)==="teal"?"var(--teal-soft)":catTone(s)==="orange"?"var(--orange-soft)":catTone(s)==="green"?"var(--green-soft)":"var(--amber-soft)", border:"1px solid " + (catTone(s)==="brand"?"var(--brand)":catTone(s)==="teal"?"var(--teal)":catTone(s)==="orange"?"var(--orange)":catTone(s)==="green"?"var(--green)":"var(--amber)")}} />{s}</span>
          ))}
        </div>
      </div>
      <div className="card" style={{overflow:"auto", position:"relative"}}>
        <div className="cal" style={{minWidth: 1100}}>
          <div className="cal__head" style={{borderRight:"1px solid var(--border-strong)"}}>Property</div>
          {dayHeaders.map(h => (
            <div key={h.day} className={"cal__head " + (h.isWeekend ? "cal__weekend" : "") + (h.day === today ? " cal__today" : "")}>
              <div style={{fontSize:10, color:"var(--ink-4)"}}>{h.label}</div>
              <div style={{fontWeight:700, color: h.day === today ? "var(--brand)" : "var(--ink-2)"}}>{h.day}</div>
            </div>
          ))}
          {propRows.map(p => (
            <React.Fragment key={p.id}>
              <div className="cal__rowhead">
                <div style={{width:24, height:24, background:p.color, borderRadius:6, color:"white", fontSize:10, fontWeight:700, display:"grid", placeItems:"center"}}>{p.img}</div>
                <div><div style={{fontSize:12.5, fontWeight:600}}>{p.name}</div><div style={{fontSize:10.5, color:"var(--ink-3)"}}>{p.sub}</div></div>
              </div>
              {dayList.map(d => {
                const bar = p.bars.find(b => b.startDay === d);
                const isWeekend = new Date(calYear, calMonth, d).getDay() % 6 === 0;
                const srcTone = bar ? catTone(bar.source) : "neutral";
                return (
                  <div key={d} className={"cal__cell " + (isWeekend ? "cal__weekend " : "") + (d === today ? "cal__today" : "")}>
                    {bar && (
                      <div className={"cal__bar cal__bar--" + srcTone}
                        style={{width: ((bar.endDay - bar.startDay + 1) * 100) + "%", zIndex: 2, background: srcTone==="brand"?"var(--brand-soft)":srcTone==="teal"?"var(--teal-soft)":srcTone==="green"?"var(--green-soft)":srcTone==="orange"?"var(--orange-soft)":"var(--amber-soft)", borderColor: srcTone==="brand"?"var(--brand)":srcTone==="teal"?"var(--teal)":srcTone==="green"?"var(--green)":srcTone==="orange"?"var(--orange)":"var(--amber)", color: srcTone==="brand"?"var(--brand-ink)":srcTone==="teal"?"#266076":srcTone==="green"?"#1E6A37":"#8B6300", cursor:"pointer"}}
                        onClick={(e) => handleBarClick(e, bar)}>
                        {bar.guest.split(" ")[0]} · {bar.nights}n
                      </div>
                    )}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Booking detail popup */}
      {popup && (
        <div style={{position:"fixed", left: Math.min(popup.x - 160, window.innerWidth - 340), top: popup.y, zIndex:50, width:320, background:"white", borderRadius:12, border:"1px solid var(--border)", boxShadow:"0 8px 32px rgba(0,0,0,0.15)", padding:16}} onClick={e => e.stopPropagation()}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:10}}>
            <div>
              <div style={{fontWeight:700, fontSize:15}}>{popup.booking.guest}</div>
              <div className="muted">{findProp(popup.booking.property).name}</div>
            </div>
            <button className="btn btn--ghost btn--icon btn--sm" onClick={() => setPopup(null)}><Icon name="close" size={14}/></button>
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:8, fontSize:13}}>
            {popup.booking.mobile && (
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <span style={{color:"var(--ink-3)"}}>Mobile</span>
                <a href={"https://wa.me/" + (popup.booking.mobile||"").replace(/[^0-9]/g,"")} target="_blank" rel="noopener" style={{color:"var(--teal)", fontWeight:600, textDecoration:"none", display:"flex", alignItems:"center", gap:4}}>
                  {popup.booking.mobile} <span style={{fontSize:11, background:"var(--green-soft)", color:"var(--green)", padding:"1px 6px", borderRadius:4, fontWeight:700}}>WhatsApp</span>
                </a>
              </div>
            )}
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"var(--ink-3)"}}>Check-in</span>
              <span style={{fontWeight:600}}>{fmtDateLong(popup.booking.checkIn)}</span>
            </div>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"var(--ink-3)"}}>Check-out</span>
              <span style={{fontWeight:600}}>{fmtDateLong(popup.booking.checkOut)}</span>
            </div>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"var(--ink-3)"}}>Nights / Guests</span>
              <span style={{fontWeight:600}}>{popup.booking.nights}n · {popup.booking.guests} guests</span>
            </div>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"var(--ink-3)"}}>Source</span>
              <Tag tone={catTone(popup.booking.source)} dot>{popup.booking.source}</Tag>
            </div>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <span style={{color:"var(--ink-3)"}}>Total</span>
              <span style={{fontWeight:700, color:"var(--green)"}}>{INR(popup.booking.total)}</span>
            </div>
            {popup.booking.cleaningSchedule && popup.booking.cleaningSchedule !== "None" && (
              <div style={{display:"flex", justifyContent:"space-between"}}>
                <span style={{color:"var(--ink-3)"}}>Cleaning</span>
                <span>{popup.booking.cleaningSchedule}</span>
              </div>
            )}
            {popup.booking.concierge && popup.booking.concierge.length > 0 && (
              <div>
                <div style={{color:"var(--ink-3)", marginBottom:4}}>Preferences</div>
                <div style={{display:"flex", gap:4, flexWrap:"wrap"}}>
                  {popup.booking.concierge.map(c => <Tag key={c} tone="teal">{c}</Tag>)}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ───────── HOUSEKEEPING & LAUNDRY ───────── */
function PageHousekeeping({ store, settings, dispatch, onToast }) {
  const [tab, setTab] = useStateC("rotation");
  const [filter, setFilter] = useStateC("all");
  const [laundryEditing, setLaundryEditing] = useStateC(null); // booking id being edited

  // Laundry overrides stored in state
  const [laundryOverrides, setLaundryOverrides] = useStateC(() => {
    try { const raw = localStorage.getItem("cms_laundry_overrides"); if (raw) return JSON.parse(raw); } catch(e) {}
    return {};
  });
  const saveLaundryOverride = (bookingId, data) => {
    const updated = { ...laundryOverrides, [bookingId]: data };
    setLaundryOverrides(updated);
    localStorage.setItem("cms_laundry_overrides", JSON.stringify(updated));
  };

  // Auto-generate housekeeping tasks from bookings
  const autoTasks = store.bookings.flatMap(b => {
    const tasks = [];
    tasks.push({
      id: "hk-co-"+b.id, property: b.property, date: b.checkOut,
      time: settings.hkCheckoutTime || "11:00", type: "Turnover clean",
      assignee: "Housekeeping team", status: b.status === "checked-out" ? "done" : "scheduled",
      source: "auto : checkout"
    });
    if ((b.cleaningSchedule === "Alternate" || b.cleaningSchedule === "Daily") && b.nights >= 3) {
      const startNight = settings.hkMidStayStartNight || 3;
      const step = b.cleaningSchedule === "Daily" ? 1 : 2;
      for (let n = startNight; n <= b.nights; n += step) {
        const d = new Date(b.checkIn);
        d.setDate(d.getDate() + n - 1);
        tasks.push({
          id: "hk-mid-"+b.id+"-"+n, property: b.property, date: d.toISOString().slice(0,10),
          time: "12:00", type: b.cleaningSchedule === "Daily" ? "Daily clean" : "Alternate-day clean",
          assignee: "Housekeeping team", status: d < TODAY ? "done" : "scheduled",
          source: "auto : mid-stay"
        });
      }
    }
    return tasks;
  });

  const allTasks = [...autoTasks, ...store.housekeeping]
    .filter(t => filter === "all" || t.property === filter)
    .sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));

  const byDay = {};
  allTasks.forEach(t => { byDay[t.date] = byDay[t.date] || []; byDay[t.date].push(t); });

  // Auto-generate laundry from bookings (at checkout)
  const autoLaundry = store.bookings.filter(b => b.status === "checked-out" || b.status === "in-house").map(b => {
    const p = findProp(b.property);
    const rooms = p.bedrooms;
    const lpr = settings.laundryPerRoom || { towels: 2, pillowCovers: 1, bedSheets: 1 };
    const override = laundryOverrides[b.id] || {};
    const defaultOut = { towels: rooms * lpr.towels, pillowCovers: rooms * lpr.pillowCovers, bedSheets: rooms * lpr.bedSheets };
    const sentOut = override.sentOut || defaultOut;
    const receivedBack = override.receivedBack || null;
    const isReconciled = !!receivedBack;
    const hasDiscrepancy = isReconciled && (receivedBack.towels !== sentOut.towels || receivedBack.bedSheets !== sentOut.bedSheets || receivedBack.pillowCovers !== sentOut.pillowCovers);
    return {
      id: "ldr-" + b.id, bookingId: b.id, property: b.property, date: b.checkOut,
      guestName: b.guest, rooms,
      sentOut, receivedBack, isReconciled, hasDiscrepancy,
    };
  }).filter(l => filter === "all" || l.property === filter);

  return (
    <div className="page">
      <div className="page__head">
        <div>
          <h2 className="page__title">Housekeeping & Laundry</h2>
          <div className="page__sub">Auto-generated from bookings. Cleaning frequency & laundry items are configurable in Settings.</div>
        </div>
      </div>

      <div className="kpis" style={{marginBottom:14}}>
        <Kpi label="Total tasks" value={allTasks.length} sub={allTasks.filter(t=>t.status==="done").length + " completed"} />
        <Kpi label="Scheduled" value={allTasks.filter(t=>t.status==="scheduled").length} />
        <Kpi label="Laundry batches" value={autoLaundry.length} sub={autoLaundry.filter(l=>!l.isReconciled).length + " pending reconciliation"} />
        <Kpi label="Items per room" value={`${(settings.laundryPerRoom||{}).towels||2}T / ${(settings.laundryPerRoom||{}).bedSheets||1}BS / ${(settings.laundryPerRoom||{}).pillowCovers||1}PC`} sub="Configure in Settings" />
      </div>

      <div style={{display:"flex", gap:10, marginBottom:14, alignItems:"center", flexWrap:"wrap"}}>
        <div className="seg">
          <button className={tab==="rotation"?"active":""} onClick={()=>setTab("rotation")}>Rotation</button>
          <button className={tab==="laundry"?"active":""} onClick={()=>setTab("laundry")}>Laundry tracker</button>
        </div>
        <select className="btn" style={{padding:"7px 10px"}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All properties</option>
          {PROPERTIES.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>

      {tab === "rotation" && (
        <div className="card">
          <div className="card__body" style={{padding:0}}>
            {Object.entries(byDay).map(([date, list]) => (
              <div key={date} style={{borderBottom:"1px solid var(--border)"}}>
                <div style={{padding:"10px 18px", background:"var(--surface-2)", display:"flex", justifyContent:"space-between", fontSize:12.5, fontWeight:600}}>
                  <span>{new Date(date).toLocaleDateString("en",{weekday:"long", month:"short", day:"numeric"})}</span>
                  <span className="muted">{list.length} task{list.length!==1?"s":""}</span>
                </div>
                {list.map(t => (
                  <div key={t.id} style={{display:"grid", gridTemplateColumns:"60px 1fr 1fr auto auto", gap:14, alignItems:"center", padding:"12px 18px", borderTop:"1px solid var(--border)"}}>
                    <div style={{fontSize:13, fontWeight:700, color:"var(--brand)"}}>{t.time}</div>
                    <PropertyCell id={t.property} />
                    <div><div style={{fontSize:13, fontWeight:600}}>{t.type}</div><div className="muted">{t.source || t.assignee}</div></div>
                    <StatusDot status={t.status} />

  <script type="text/babel">
/* CurateMyStay v3 — Pages: Budgeting (admin only) + Settings + Backend Sync */
const { useState: useStateD, useEffect: useEffectD, useRef: useRefD } = React;

/* ───────── BUDGETING ───────── */
function PageBudget({ store, settings, dispatch, onToast }) {
  const [budgetData, setBudgetData] = useStateD(() => {
    try { const raw = localStorage.getItem("cms_budget"); if (raw) return JSON.parse(raw); } catch(e) {}
    return { ...DEFAULT_BUDGET };
  });
  const saveBudget = (d) => { setBudgetData(d); localStorage.setItem("cms_budget", JSON.stringify(d)); };
  const getVal = (item, month) => budgetData[item + "|" + month] || 0;
  const setVal = (item, month, val) => saveBudget({ ...budgetData, [item + "|" + month]: Number(val) || 0 });

  // Manual opening balance for first month
  const [openingBalanceApr, setOpeningBalanceApr] = useStateD(() => {
    try { const v = localStorage.getItem("cms_opening_balance_apr"); if (v) return Number(v); } catch(e) {}
    return 0;
  });
  const updateOpeningApr = (val) => {
    const n = Number(val) || 0;
    setOpeningBalanceApr(n);
    localStorage.setItem("cms_opening_balance_apr", String(n));
  };

  // CMS revenue per month (20% of profit per property)
  // For simplicity: all current bookings/expenses are attributed to May (index 1)
  const cmsRevByMonth = BUDGET_MONTHS.map((m, i) => {
    if (i === 1) { // May-26
      const rev = store.bookings.reduce((s,b) => s + b.total, 0);
      const exp = store.expenses.reduce((s,e) => s + e.amount, 0);
      return Math.round((rev - exp) * 0.2);
    }
    return 0;
  });

  // Calculate opening/closing balances per month
  const monthlyTotals = BUDGET_MONTHS.map((m, i) => {
    const totalExpense = BUDGET_CATEGORIES.flatMap(c => c.items).reduce((s, item) => s + getVal(item, m), 0);
    const cmsRev = cmsRevByMonth[i];
    return { month: m, totalExpense, cmsRev };
  });

  const openingBalances = [];
  const closingBalances = [];
  for (let i = 0; i < BUDGET_MONTHS.length; i++) {
    const opening = i === 0 ? openingBalanceApr : closingBalances[i - 1];
    const closing = opening + monthlyTotals[i].cmsRev - monthlyTotals[i].totalExpense;
    openingBalances.push(opening);
    closingBalances.push(closing);
  }

  // PnL dashboard (top section)
  const propPnL = PROPERTIES.map(p => {
    const rev = store.bookings.filter(b => b.property === p.id).reduce((s,b) => s+b.total, 0);
    const exp = store.expenses.filter(e => e.property === p.id).reduce((s,e) => s+e.amount, 0);
    const profit = rev - exp;
    return { ...p, rev, exp, profit, ownerShare: Math.round(profit * 0.8), cmsShare: Math.round(profit * 0.2) };
  });
  const totalRev = propPnL.reduce((s,p) => s+p.rev, 0);
  const totalExp = propPnL.reduce((s,p) => s+p.exp, 0);
  const totalProfit = totalRev - totalExp;
  const totalOwner = propPnL.reduce((s,p) => s+p.ownerShare, 0);
  const totalCMS = propPnL.reduce((s,p) => s+p.cmsShare, 0);

  return (
    <div className="page">
      <div className="page__head">
        <div>
          <h2 className="page__title">CMS Budgeting : FY 2026-27</h2>
          <div className="page__sub">Financial planning view. Top: live portfolio P&L. Bottom: monthly company budget with editable cells. Opening balances auto-calculate from previous months.</div>
        </div>
      </div>

      {/* Portfolio P&L summary */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card__head"><div className="card__title">CurateMyStay : Portfolio P&L</div><div className="card__sub">Live from bookings & expenses</div></div>
        <div className="card__body table-scroll" style={{padding:0}}>
          <table className="table" style={{fontSize:12.5}}>
            <thead>
              <tr><th></th><th className="num">Costa Vista</th><th className="num">Saudaudes</th><th className="num">Risara 202</th><th className="num">Risara 203</th><th className="num">Ratan Exotica</th><th className="num" style={{fontWeight:800}}>TOTAL</th></tr>
            </thead>
            <tbody>
              <tr style={{background:"var(--surface-2)"}}><td colSpan="7" style={{fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", color:"var(--ink-3)"}}>Gross Portfolio Revenue</td></tr>
              <tr><td style={{fontWeight:600}}>Revenue</td>{propPnL.map(p => <td key={p.id} className="num">{INR(p.rev)}</td>)}<td className="num" style={{fontWeight:700}}>{INR(totalRev)}</td></tr>
              <tr style={{background:"var(--surface-2)"}}><td colSpan="7" style={{fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", color:"var(--ink-3)"}}>Operating Expenses</td></tr>
              <tr><td style={{fontWeight:600}}>Expenses</td>{propPnL.map(p => <td key={p.id} className="num">{INR(p.exp)}</td>)}<td className="num" style={{fontWeight:700}}>{INR(totalExp)}</td></tr>
              <tr><td style={{fontWeight:600}}>Expense ratio</td>{propPnL.map(p => <td key={p.id} className="num">{p.rev > 0 ? Math.round(p.exp/p.rev*100) : 0}%</td>)}<td className="num" style={{fontWeight:700}}>{totalRev > 0 ? Math.round(totalExp/totalRev*100) : 0}%</td></tr>
              <tr style={{background:"var(--surface-2)"}}><td colSpan="7" style={{fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", color:"var(--ink-3)"}}>Net Profit</td></tr>
              <tr><td style={{fontWeight:700}}>Profit</td>{propPnL.map(p => <td key={p.id} className="num" style={{fontWeight:700, color: p.profit >= 0 ? "var(--green)" : "var(--brand)"}}>{INR(p.profit)}</td>)}<td className="num" style={{fontWeight:800, color: totalProfit >= 0 ? "var(--green)" : "var(--brand)"}}>{INR(totalProfit)}</td></tr>
              <tr style={{background:"var(--surface-2)"}}><td colSpan="7" style={{fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", color:"var(--ink-3)"}}>Profit Distribution (80/20)</td></tr>
              {propPnL.map(p => (
                <tr key={"o"+p.id}><td style={{paddingLeft:14}}>Owner: {p.name}</td><td colSpan="5"></td><td className="num">{INR(p.ownerShare)}</td></tr>
              ))}
              <tr><td style={{fontWeight:600}}>Total to owners</td><td colSpan="5"></td><td className="num" style={{fontWeight:700}}>{INR(totalOwner)}</td></tr>
              {propPnL.map(p => (
                <tr key={"c"+p.id}><td style={{paddingLeft:14}}>CMS: {p.name}</td><td colSpan="5"></td><td className="num">{INR(p.cmsShare)}</td></tr>
              ))}
              <tr><td style={{fontWeight:600}}>Total CMS revenue</td><td colSpan="5"></td><td className="num" style={{fontWeight:700, color:"var(--green)"}}>{INR(totalCMS)}</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* Company Budget */}
      <div className="card">
        <div className="card__head">
          <div><div className="card__title">CMS Company Budget : Apr 2026 to Mar 2027</div><div className="card__sub">Click any cell to edit. Opening balance auto-populates from previous month. Set Apr opening balance manually.</div></div>
        </div>
        <div className="card__body table-scroll" style={{padding:0}}>
          <table className="table" style={{fontSize:11.5, minWidth:1200}}>
            <thead>
              <tr>
                <th style={{minWidth:220, position:"sticky", left:0, background:"var(--surface)", zIndex:2}}></th>
                {BUDGET_MONTHS.map(m => <th key={m} className="num" style={{minWidth:80}}>{m}</th>)}
                <th className="num" style={{fontWeight:800, minWidth:90}}>ANNUAL</th>
              </tr>
            </thead>
            <tbody>
              {/* Cash position */}
              <tr style={{background:"var(--surface-2)"}}><td colSpan={BUDGET_MONTHS.length + 2} style={{fontWeight:700, fontSize:11, textTransform:"uppercase", color:"var(--ink-3)", position:"sticky", left:0}}>CMS Cash Position</td></tr>
              <tr>
                <td style={{paddingLeft:14, position:"sticky", left:0, background:"white", fontWeight:600}}>Opening balance</td>
                {BUDGET_MONTHS.map((m, i) => (
                  <td key={m} className="num" style={{padding: i === 0 ? 0 : "8px 6px", fontWeight:600, color: openingBalances[i] >= 0 ? "var(--green)" : "var(--brand)"}}>
                    {i === 0 ? (
                      <input type="number" value={openingBalanceApr || ""} onChange={e => updateOpeningApr(e.target.value)}
                        style={{width:"100%", border:"none", background:"#E6F4EA", padding:"8px 6px", textAlign:"right", fontSize:11.5, fontVariantNumeric:"tabular-nums"}} placeholder="0" title="Set April opening balance" />
                    ) : INR(openingBalances[i])}
                  </td>
                ))}
                <td className="num" style={{fontWeight:600}}>-</td>
              </tr>
              <tr>
                <td style={{paddingLeft:14, position:"sticky", left:0, background:"white", fontWeight:500, color:"var(--ink-3)"}}>+ CMS revenue (20% share)</td>
                {BUDGET_MONTHS.map((m, i) => (
                  <td key={m} className="num" style={{color: cmsRevByMonth[i] > 0 ? "var(--green)" : "var(--ink-4)"}}>{cmsRevByMonth[i] > 0 ? INR(cmsRevByMonth[i]) : "-"}</td>
                ))}
                <td className="num" style={{fontWeight:600, color:"var(--green)"}}>{INR(cmsRevByMonth.reduce((s,v) => s+v, 0))}</td>
              </tr>
              <tr style={{background:"#F9F8F3"}}>
                <td style={{paddingLeft:14, position:"sticky", left:0, background:"#F9F8F3", fontWeight:700}}>Closing balance</td>
                {BUDGET_MONTHS.map((m, i) => (
                  <td key={m} className="num" style={{fontWeight:700, color: closingBalances[i] >= 0 ? "var(--green)" : "var(--brand)"}}>{INR(closingBalances[i])}</td>
                ))}
                <td className="num" style={{fontWeight:800}}>{INR(closingBalances[closingBalances.length-1])}</td>
              </tr>

              {/* Budget categories */}
              {BUDGET_CATEGORIES.map(cat => (
                <React.Fragment key={cat.section}>
                  <tr style={{background:"var(--surface-2)"}}>
                    <td colSpan={BUDGET_MONTHS.length + 2} style={{fontWeight:700, fontSize:11, textTransform:"uppercase", color:"var(--ink-3)", position:"sticky", left:0}}>{cat.section}</td>
                  </tr>
                  {cat.items.map(item => {
                    const annual = BUDGET_MONTHS.reduce((s, m) => s + getVal(item, m), 0);
                    return (
                      <tr key={item}>
                        <td style={{paddingLeft:14, fontSize:12, position:"sticky", left:0, background:"white"}}>{item}</td>
                        {BUDGET_MONTHS.map(m => (
                          <td key={m} className="num" style={{padding:0}}>
                            <input type="number" value={getVal(item, m) || ""} onChange={e => setVal(item, m, e.target.value)}
                              style={{width:"100%", border:"none", background: getVal(item, m) > 0 ? "#FFF9E0" : "transparent", padding:"8px 6px", textAlign:"right", fontSize:11.5, fontVariantNumeric:"tabular-nums"}} placeholder="0" />
                          </td>
                        ))}
                        <td className="num" style={{fontWeight:600}}>{annual > 0 ? INR(annual) : "-"}</td>
                      </tr>
                    );
                  })}
                </React.Fragment>
              ))}

              {/* Totals */}
              <tr style={{background:"var(--surface-2)", borderTop:"2px solid var(--ink)"}}>
                <td style={{fontWeight:800, position:"sticky", left:0, background:"var(--surface-2)"}}>TOTAL CMS EXPENSES</td>
                {BUDGET_MONTHS.map((m, i) => {
                  const t = monthlyTotals[i].totalExpense;
                  return <td key={m} className="num" style={{fontWeight:700}}>{t > 0 ? INR(t) : "-"}</td>;
                })}
                <td className="num" style={{fontWeight:800}}>
                  {INR(monthlyTotals.reduce((s, mt) => s + mt.totalExpense, 0))}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ───────── SETTINGS ───────── */
function PageSettings({ settings, onUpdateSettings, onToast, dispatch, store }) {
  const [activeTab, setActiveTab] = useStateD("sources");
  const fileInputRef = useRefD(null);
  const [syncStatus, setSyncStatus] = useStateD("idle"); // idle, syncing, synced, error
  const [lastSync, setLastSync] = useStateD(() => localStorage.getItem("cms_last_sync") || null);

  const addItem = (key) => {
    const val = prompt("Add new option:");
    if (val && val.trim()) {
      onUpdateSettings({ ...settings, [key]: [...settings[key], val.trim()] });
      onToast("Added: " + val.trim());
    }
  };
  const removeItem = (key, item) => {
    onUpdateSettings({ ...settings, [key]: settings[key].filter(x => x !== item) });
    onToast("Removed: " + item);
  };

  const listEditor = (label, key) => (
    <div className="card" style={{marginBottom:14}}>
      <div className="card__head">
        <div className="card__title">{label}</div>
        <button className="btn btn--sm btn--primary" onClick={() => addItem(key)}><Icon name="plus" size={13}/> Add</button>
      </div>
      <div className="card__body">
        <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
          {settings[key].map(item => (
            <span key={item} className="tag" style={{padding:"6px 12px", fontSize:13, gap:8}}>
              {item}
              <button style={{background:"none", border:"none", cursor:"pointer", padding:0, color:"var(--ink-3)"}} onClick={() => removeItem(key, item)}>
                <Icon name="close" size={12}/>
              </button>
            </span>
          ))}
        </div>
      </div>
    </div>
  );

  // Backend sync functions
  const exportAllData = () => {
    const data = {
      version: "cms-v3",
      exportedAt: new Date().toISOString(),
      store: JSON.parse(localStorage.getItem(LS_KEY) || "{}"),
      settings: JSON.parse(localStorage.getItem("cms_settings") || "{}"),
      budget: JSON.parse(localStorage.getItem("cms_budget") || "{}"),
      laundryOverrides: JSON.parse(localStorage.getItem("cms_laundry_overrides") || "{}"),
      openingBalance: localStorage.getItem("cms_opening_balance_apr") || "0",
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "cms-data-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
    const now = new Date().toLocaleString();
    setLastSync(now);
    localStorage.setItem("cms_last_sync", now);
    onToast("Data exported successfully");
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.store) {
          localStorage.setItem(LS_KEY, JSON.stringify(data.store));
        }
        if (data.settings) {
          localStorage.setItem("cms_settings", JSON.stringify(data.settings));
        }
        if (data.budget) {
          localStorage.setItem("cms_budget", JSON.stringify(data.budget));
        }
        if (data.laundryOverrides) {
          localStorage.setItem("cms_laundry_overrides", JSON.stringify(data.laundryOverrides));
        }
        if (data.openingBalance !== undefined) {
          localStorage.setItem("cms_opening_balance_apr", data.openingBalance);
        }
        const now = new Date().toLocaleString();
        setLastSync(now);
        localStorage.setItem("cms_last_sync", now);
        setSyncStatus("synced");
        onToast("Data imported! Refreshing...");
        setTimeout(() => window.location.reload(), 800);
      } catch(err) {
        onToast("Import failed : invalid JSON file");
        setSyncStatus("error");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="page">
      <div className="page__head">
        <div>
          <h2 className="page__title">Settings</h2>
          <div className="page__sub">Configure dropdown options, housekeeping rules, and laundry items. Changes apply everywhere instantly.</div>
        </div>
      </div>

      <div style={{display:"flex", gap:10, marginBottom:14, flexWrap:"wrap"}}>
        {[["sources","Booking Sources"],["expenses","Expense Categories"],["company","Company Expenses"],["concierge","Concierge"],["housekeeping","Housekeeping"],["data","Data & Backend"]].map(([id, label]) => (
          <button key={id} className={"tag tag--" + (activeTab === id ? "brand" : "neutral")} style={{cursor:"pointer", padding:"6px 14px", fontSize:13}} onClick={() => setActiveTab(id)}>{label}</button>
        ))}
      </div>

      {activeTab === "sources" && listEditor("Booking Sources", "bookingSources")}
      {activeTab === "expenses" && listEditor("Property Expense Categories", "expenseCategories")}
      {activeTab === "company" && listEditor("Company Expense Categories", "companyExpenseCategories")}
      {activeTab === "concierge" && listEditor("Concierge Options", "conciergeOptions")}

      {activeTab === "housekeeping" && (
        <div className="grid-2">
          <div className="card">
            <div className="card__head"><div className="card__title">Housekeeping Rules</div></div>
            <div className="card__body">
              <div className="col" style={{gap:14}}>
                <div className="field"><label>Post-checkout clean time</label>
                  <input type="time" value={settings.hkCheckoutTime} onChange={e => onUpdateSettings({...settings, hkCheckoutTime: e.target.value})} />
                  <div className="hint">Turnover clean triggers at this time on checkout day</div>
                </div>
                <div className="field"><label>Mid-stay cleaning starts from night #</label>
                  <input type="number" min="2" value={settings.hkMidStayStartNight} onChange={e => onUpdateSettings({...settings, hkMidStayStartNight: Number(e.target.value)})} />
                  <div className="hint">For "Alternate" schedule: clean on this night, then every 2 days.</div>
                </div>
                {listEditor("Cleaning Frequency Options", "cleaningFrequencies")}
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card__head"><div className="card__title">Laundry : Items per Room</div></div>
            <div className="card__body">
              <div className="col" style={{gap:14}}>
                <div className="field"><label>Towels per room</label>
                  <input type="number" min="0" value={(settings.laundryPerRoom || {}).towels || 2} onChange={e => onUpdateSettings({...settings, laundryPerRoom: {...(settings.laundryPerRoom || {}), towels: Number(e.target.value)}})} />
                </div>
                <div className="field"><label>Pillow covers per room</label>
                  <input type="number" min="0" value={(settings.laundryPerRoom || {}).pillowCovers || 1} onChange={e => onUpdateSettings({...settings, laundryPerRoom: {...(settings.laundryPerRoom || {}), pillowCovers: Number(e.target.value)}})} />
                </div>
                <div className="field"><label>Bed sheets per room</label>
                  <input type="number" min="0" value={(settings.laundryPerRoom || {}).bedSheets || 1} onChange={e => onUpdateSettings({...settings, laundryPerRoom: {...(settings.laundryPerRoom || {}), bedSheets: Number(e.target.value)}})} />
                </div>
                <div className="field"><label>Duvet cover wash frequency (every N nights)</label>
                  <input type="number" min="1" value={settings.duvetFrequencyNights || 7} onChange={e => onUpdateSettings({...settings, duvetFrequencyNights: Number(e.target.value)})} />
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {activeTab === "data" && (
        <div className="col" style={{gap:14}}>
          {/* Sync status banner */}
          <div className="card">
            <div className="card__head"><div className="card__title">Backend Data Store</div></div>
            <div className="card__body">
              <div className="col" style={{gap:14}}>
                <div style={{padding:"14px 16px", background:"var(--teal-soft)", borderRadius:10, fontSize:13, color:"#266076", display:"flex", gap:10, alignItems:"start"}}>
                  <Icon name="spark" size={16} color="#266076" />
                  <div>
                    <strong>How it works:</strong> All dashboard data is saved locally in your browser. Use Export to create a JSON backup file that serves as your backend data store. Import it back anytime to restore or transfer data. Both operations are instant and create a complete snapshot of all modules.
                  </div>
                </div>

                {lastSync && (
                  <div style={{display:"flex", alignItems:"center", gap:8, fontSize:13, color:"var(--ink-3)"}}>
                    <span style={{width:8, height:8, borderRadius:"50%", background:"var(--green)"}}></span>
                    Last sync : {lastSync}
                  </div>
                )}

                <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
                  <button className="btn btn--primary" onClick={exportAllData}>
                    <Icon name="download" size={14}/> Export all data (JSON)
                  </button>
                  <button className="btn" onClick={() => fileInputRef.current?.click()}>
                    <Icon name="upload" size={14}/> Import from JSON
                  </button>
                  <input ref={fileInputRef} type="file" accept=".json" style={{display:"none"}} onChange={importData} />
                </div>

                <div className="divider" style={{margin:0}} />

                <div style={{fontSize:12, fontWeight:700, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.05em"}}>What gets exported / imported</div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
                  {["Bookings & revenue", "Property expenses", "Company expenses", "Disputes & queries", "Budget data", "Settings & config", "Laundry overrides", "Opening balances"].map(item => (
                    <div key={item} style={{display:"flex", alignItems:"center", gap:6, fontSize:12.5, padding:"6px 10px", background:"var(--surface-2)", borderRadius:6}}>
                      <Icon name="check" size={12} color="var(--green)" /> {item}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Data management */}
          <div className="card">
            <div className="card__head"><div className="card__title">Data Management</div></div>
            <div className="card__body">
              <div className="col" style={{gap:14}}>
                <div style={{padding:"14px 16px", background:"var(--surface-2)", borderRadius:10, fontSize:13, color:"var(--ink-2)"}}>
                  <strong>For production deployment:</strong> Replace localStorage with a PostgreSQL or Firebase backend. Each module maps to a database table. API endpoints handle CRUD operations with role-based auth (JWT tokens). The frontend would fetch data via REST or GraphQL. The JSON export format is designed to be the schema seed.
                </div>
                <div className="grid-3">
                  <button className="btn" style={{color:"var(--brand)"}} onClick={() => {
                    if (confirm("This will CLEAR all bookings, expenses, and disputes. Settings and budget are preserved. Continue?")) {
                      dispatch({ type: "reset" });
                      onToast("All transaction data cleared");
                    }
                  }}><Icon name="trash" /> Clear all entries</button>
                  <button className="btn" onClick={() => {
                    if (confirm("Load sample data? This adds demo entries alongside any existing data.")) {
                      SEED_BOOKINGS.forEach(b => dispatch({type:"add_booking", payload: {...b, id: b.id + "-" + Date.now()}}));
                      SEED_EXPENSES.forEach(e => dispatch({type:"add_expense", payload: {...e, id: e.id + "-" + Date.now()}}));
                      SEED_COMPANY_EXPENSES.forEach(c => dispatch({type:"add_company", payload: {...c, id: c.id + "-" + Date.now()}}));
                      onToast("Sample data loaded");
                    }
                  }}><Icon name="upload" /> Load sample data</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { PageBudget, PageSettings });

  </script>

  <!-- ═══════════════════════════════════════════════════════════
       MODULE 7 : APP ENTRY POINT
       Reducer, routing, session management, and root render.
       ═══════════════════════════════════════════════════════════ -->
  <script type="text/babel">
/* ───────── APP ENTRY POINT ───────── */
const { useState, useReducer, useEffect } = React;

function reducer(state, action) {
  switch (action.type) {
    case "add_booking":    return { ...state, bookings: [action.payload, ...state.bookings] };
    case "update_booking": return { ...state, bookings: state.bookings.map(b => b.id === action.payload.id ? action.payload : b) };
    case "delete_booking": return { ...state, bookings: state.bookings.filter(b => b.id !== action.id) };
    case "add_expense":    return { ...state, expenses: [action.payload, ...state.expenses] };
    case "update_expense": return { ...state, expenses: state.expenses.map(e => e.id === action.payload.id ? action.payload : e) };
    case "delete_expense": return { ...state, expenses: state.expenses.filter(e => e.id !== action.id) };
    case "add_company":    return { ...state, companyExpenses: [action.payload, ...state.companyExpenses] };
    case "update_company": return { ...state, companyExpenses: state.companyExpenses.map(e => e.id === action.payload.id ? action.payload : e) };
    case "delete_company": return { ...state, companyExpenses: state.companyExpenses.filter(e => e.id !== action.id) };
    case "add_dispute":    return { ...state, disputes: [action.payload, ...state.disputes] };
    case "reset":          return { bookings: [], expenses: [], companyExpenses: [], housekeeping: [], laundry: [], disputes: [] };
    default: return state;
  }
}

function getInit() {
  return {
    bookings: window.SEED_BOOKINGS || [],
    expenses: window.SEED_EXPENSES || [],
    companyExpenses: window.SEED_COMPANY_EXPENSES || [],
    housekeeping: window.SEED_HOUSEKEEPING || [],
    laundry: window.SEED_LAUNDRY || [],
    disputes: window.SEED_DISPUTES || [],
  };
}

const ROUTE_META = {
  home:        { title: "Overview",          sub: "All properties, today" },
  income:      { title: "Bookings & Income", sub: "Reservations & revenue" },
  expense:     { title: "Property Expenses", sub: "Per-property operating cost" },
  pnl:         { title: "P&L : Admin",       sub: "Live profit & loss" },
  owner:       { title: "Owner Portal",      sub: "Statements & approvals" },
  calendar:    { title: "Booking Calendar",  sub: "Consolidated channel view" },
  housekeeping:{ title: "Housekeeping",      sub: "Rota & laundry tracker" },
  forma:       { title: "Forma Sheet",       sub: "Monthly statistical return" },
  company:     { title: "Company Expenses",  sub: "CurateMyStay overhead" },
  budget:      { title: "Budgeting",         sub: "FY 2026-27 planning" },
  settings:    { title: "Settings",          sub: "Configure categories & rules" },
};

const SETTINGS_KEY = "cms_settings";
function loadSettings() {
  try { const raw = localStorage.getItem(SETTINGS_KEY); if (raw) return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) }; } catch(e) {}
  return { ...DEFAULT_SETTINGS };
}

function App() {
  const [session, setSession] = useState(null);
  const [route, setRoute] = useState("home");
  const [state, dispatch] = useReducer(reducer, null, () => {
    const saved = loadState();
    return saved || getInit();
  });
  const [settings, setSettings] = useState(loadSettings);
  const [toast, setToast] = useState("");

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);
  useEffect(() => {
    if (session && session.role === "owner" && route !== "owner") setRoute("owner");
  }, [session]);

  const handleLogin = (s) => { setSession(s); setRoute(s.role === "owner" ? "owner" : "home"); };
  const handleLogout = () => { setSession(null); setRoute("home"); };

  if (!session) return <LoginScreen onLogin={handleLogin} />;

  const meta = ROUTE_META[route] || ROUTE_META.home;

  return (
    <div className="app" data-screen-label={"persona-" + session.role + "-" + route}>
      <Sidebar route={route} onRoute={setRoute} session={session} />
      <main style={{minWidth:0}}>
        <Topbar title={meta.title} sub={meta.sub} session={session} onLogout={handleLogout} />
        {session.role === "admin" && route === "home"        && <PageHome    store={state} settings={settings} onRoute={setRoute} onToast={setToast} />}
        {session.role === "admin" && route === "income"      && <PageIncome  store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "expense"     && <PageExpense store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "pnl"         && <PagePnL     store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "owner"       && <PageOwner   store={state} settings={settings} dispatch={dispatch} onToast={setToast} session={session} />}
        {session.role === "admin" && route === "calendar"    && <PageCalendar store={state} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "housekeeping"&& <PageHousekeeping store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "forma"       && <PageForma   store={state} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "company"     && <PageCompany store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "budget"      && <PageBudget  store={state} settings={settings} dispatch={dispatch} onToast={setToast} />}
        {session.role === "admin" && route === "settings"    && <PageSettings settings={settings} onUpdateSettings={setSettings} onToast={setToast} dispatch={dispatch} store={state} />}
        {session.role === "owner" && <PageOwner store={state} settings={settings} dispatch={dispatch} onToast={setToast} session={session} />}
        <Toast msg={toast} onDone={() => setToast("")} />
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
